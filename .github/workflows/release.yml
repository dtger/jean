name: 'Release Jean'

on:
  push:
    tags:
      - 'v*.*.*-pi.*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0 or v0.1.44-pi.1)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  publish-tauri:
    permissions:
      contents: write
    env:
      HAS_APPLE_SIGNING: ${{ secrets.APPLE_CERTIFICATE != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' }}
      HAS_TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin --bundles app,dmg'
          - platform: 'ubuntu-22.04'
            args: '--bundles deb,rpm'
          - platform: 'ubuntu-22.04-arm'
            args: '--bundles deb,rpm'
          - platform: 'windows-latest'
            args: '--bundles msi,nsis'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Patch version from release tag
        shell: bash
        env:
          HAS_APPLE_SIGNING: ${{ env.HAS_APPLE_SIGNING }}
          HAS_TAURI_PRIVATE_KEY: ${{ env.HAS_TAURI_PRIVATE_KEY }}
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.version || github.ref_name }}"
          VERSION="${TAG#v}"
          echo "Patching version to $VERSION"
          VERSION="$VERSION" node -e "const p=require('./package.json'); p.version=process.env.VERSION; require('fs').writeFileSync('package.json', JSON.stringify(p,null,2)+'\n')"
          VERSION="$VERSION" HAS_APPLE_SIGNING="$HAS_APPLE_SIGNING" HAS_TAURI_PRIVATE_KEY="$HAS_TAURI_PRIVATE_KEY" node - <<'NODE'
          const fs = require('fs')
          const c = require('./src-tauri/tauri.conf.json')
          c.version = process.env.VERSION
          if (c.plugins?.updater?.endpoints && process.env.GITHUB_REPOSITORY) {
            c.plugins.updater.endpoints = [
              `https://github.com/${process.env.GITHUB_REPOSITORY}/releases/latest/download/latest.json`,
            ]
          }
          if (process.env.HAS_APPLE_SIGNING !== 'true') {
            delete c.bundle?.macOS?.signingIdentity
            delete c.bundle?.macOS?.providerShortName
          }
          if (process.env.HAS_TAURI_PRIVATE_KEY !== 'true') {
            c.bundle.createUpdaterArtifacts = false
          }
          fs.writeFileSync('src-tauri/tauri.conf.json', `${JSON.stringify(c, null, 2)}\n`)
          NODE
          sed -i.bak "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml && rm -f src-tauri/Cargo.toml.bak

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils libfuse2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS universal targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Build and release
        if: matrix.platform != 'macos-latest' || env.HAS_APPLE_SIGNING == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tauriScript: bun run tauri
          tagName: ${{ github.event.release.tag_name || github.event.inputs.version || github.ref_name }}
          releaseId: ${{ github.event.release.id }}
          includeUpdaterJson: ${{ env.HAS_TAURI_PRIVATE_KEY == 'true' }}
          args: ${{ matrix.args }} -vv

      - name: Build and release (unsigned macOS)
        if: matrix.platform == 'macos-latest' && env.HAS_APPLE_SIGNING != 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: bun run tauri
          tagName: ${{ github.event.release.tag_name || github.event.inputs.version || github.ref_name }}
          releaseId: ${{ github.event.release.id }}
          includeUpdaterJson: ${{ env.HAS_TAURI_PRIVATE_KEY == 'true' }}
          args: ${{ matrix.args }} -vv

      # Build AppImage separately with the custom AppRun script that fixes
      # WebKitGTK/GLib compatibility on Ubuntu 24.04+ and rolling-release distros.
      # The Tauri action builds deb/rpm above; this step handles AppImage with
      # the LD_LIBRARY_PATH fix that prevents white screen crashes.
      # See: https://github.com/coollabsio/jean/issues/54
      - name: Build AppImage with WebKitGTK fix
        if: startsWith(matrix.platform, 'ubuntu')
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bash scripts/build-appimage.sh

      - name: Upload AppImage to release
        if: startsWith(matrix.platform, 'ubuntu')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.version || github.ref_name }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          BUNDLE_DIR="src-tauri/target/release/bundle/appimage"
          APPIMAGE=$(find "$BUNDLE_DIR" -name "Jean_${VERSION}_*.AppImage" ! -name "*.tar.gz" -print -quit 2>/dev/null)
          if [ -n "$APPIMAGE" ] && [ -f "$APPIMAGE" ]; then
            gh release upload "$RELEASE_TAG" "$APPIMAGE" --clobber
            # Upload updater artifacts (.tar.gz + .sig)
            if [ -f "${APPIMAGE}.tar.gz" ]; then
              gh release upload "$RELEASE_TAG" "${APPIMAGE}.tar.gz" --clobber
            fi
            if [ -f "${APPIMAGE}.tar.gz.sig" ]; then
              gh release upload "$RELEASE_TAG" "${APPIMAGE}.tar.gz.sig" --clobber
            fi
          fi

      - name: Patch latest.json for AppImage updater
        if: startsWith(matrix.platform, 'ubuntu')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.version || github.ref_name }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          BUNDLE_DIR="src-tauri/target/release/bundle/appimage"
          ARCH_LABEL="amd64"
          PLATFORM_KEY="linux-x86_64"
          if [ "$(uname -m)" = "aarch64" ]; then
            # Convention: "arm64" (not "aarch64") — must match jean.build download page
            ARCH_LABEL="arm64"
            PLATFORM_KEY="linux-aarch64"
          fi

          APPIMAGE_TAR="Jean_${VERSION}_${ARCH_LABEL}.AppImage.tar.gz"
          SIG_FILE="${BUNDLE_DIR}/${APPIMAGE_TAR}.sig"

          if [ ! -f "$SIG_FILE" ]; then
            echo "No signature file found at $SIG_FILE, skipping latest.json patch"
            exit 0
          fi

          SIGNATURE=$(cat "$SIG_FILE")
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${APPIMAGE_TAR}"

          # Download current latest.json, patch Linux platform entry, re-upload
          gh release download "$RELEASE_TAG" -p "latest.json" -D /tmp --clobber

          SIG_CONTENT="$SIGNATURE" node -e "
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('/tmp/latest.json', 'utf8'));
            data.platforms = data.platforms || {};
            data.platforms['${PLATFORM_KEY}'] = {
              signature: process.env.SIG_CONTENT,
              url: '${URL}'
            };
            fs.writeFileSync('/tmp/latest.json', JSON.stringify(data, null, 2));
          "

          gh release upload "$RELEASE_TAG" /tmp/latest.json --clobber
          echo "Patched latest.json: ${PLATFORM_KEY} -> ${URL}"
